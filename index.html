<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>

<style>
body{
    font-family: sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
}

h1{
    margin-top:40px;
}

#result{
    margin:30px;
    font-size:28px;
    font-weight:bold;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ffcc00;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
}

.card{
    margin:20px auto;
    width:220px;
    padding:20px;
    border-radius:15px;
    background:white;
    color:black;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.star{
    color:gold;
    font-size:22px;
}
</style>
</head>

<body>

<h1>🎮 ガチャゲーム</h1>

<button onclick="gacha()">ガチャを引く！</button>

<div id="result"></div>

<script>

const characters = [
{ name:"スライム", rarity:1 },
{ name:"村人", rarity:2 },
{ name:"騎士", rarity:3 },
{ name:"魔法使い", rarity:4 },
{ name:"伝説のドラゴン", rarity:5 }
];

function gacha(){

    let r = Math.random()*100;
    let rarity;

    if(r < 50) rarity = 1;
    else if(r < 75) rarity = 2;
    else if(r < 90) rarity = 3;
    else if(r < 98) rarity = 4;
    else rarity = 5;

    let candidates = characters.filter(c => c.rarity === rarity);
    let character = candidates[Math.floor(Math.random()*candidates.length)];

    let stars = "★".repeat(character.rarity);

    document.getElementById("result").innerHTML =
    `
    <div class="card">
        <div class="star">${stars}</div>
        <h2>${character.name}</h2>
    </div>
    `;
}

</script>

</body>
</html>
